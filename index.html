<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Meghan & Nolan</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪩</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600&family=Sacramento&display=swap" rel="stylesheet">
  <style>
    /* ===== Design tokens (Direction 2A "Refined Editorial") ===== */
    /* Cream editorial palette; accent kept as the site's bright brand orange. */
    :root {
      --bg:      #f6f2ea;
      --bg-alt:  #efe9dd;
      --ink:     #1a1a1a;
      --muted:   #57504a;
      --faint:   #8a8078;
      --accent:  #f3722b;
      --accent-dark: #d45d1a;
      --hair:    rgba(28, 25, 23, 0.12);
      --serif:   'Bodoni Moda', Georgia, serif;
      --sans:    'Raleway', system-ui, sans-serif;
      --script:  'Sacramento', cursive;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', serif;
      background: #000; /* Black to match video during password phase */
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow: hidden;
    }
    
    
    /* Video background - fixed overlay that fades out */
    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
      overflow: hidden;
      opacity: 1;
      /* ease-in: slow start, fast end */
      transition: opacity 1.5s ease-in;
      pointer-events: none;
      /* Black backstop: when the video is re-composited at the start of the
         fade it can snap ~1-2px off the pixel grid and briefly uncover an
         edge. Painting black behind it (occluded by the opaque video except
         at that hairline seam) means the seam reveals dark — invisible on the
         dark disco video — instead of the white .main-content behind it. It
         fades out together with the video, so it leaves nothing behind. */
      background: #000;
      /* Promote to its own compositing layer up front to minimize that snap. */
      will-change: opacity;
    }

    .video-background video {
      display: block;
      /* Also bleed the video a few px past every edge (parent clips it via
         overflow:hidden) so small shifts keep showing real video, not the
         backstop. Together these make any edge seam imperceptible. */
      width: calc(100% + 6px);
      height: calc(100% + 6px);
      margin: -3px 0 0 -3px;
      object-fit: cover;
      object-position: center;
      pointer-events: none;
      transform: translateZ(0);
      backface-visibility: hidden;
    }
    
    /* Dark overlay removed for brighter video */
    .video-background::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0);
      pointer-events: none;
    }
    
    /* Fallback gradient if video doesn't load */
    body.no-video {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    /* Fade out video when content is visible */
    body.content-visible .video-background {
      opacity: 0;
      pointer-events: none;
    }
    
    .container {
      /* Container just holds password page and main content */
    }
    
    .password-page {
      position: fixed;
      top: calc(58vh - 50px); /* Same position as before */
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 200;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      transition: opacity 0.5s ease-out;
    }
    
    .password-page.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    
    .password-page h1 {
      color: #fff;
      margin-bottom: 20px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }
    
    .password-page p {
      color: #fff;
      margin-bottom: 30px;
      font-size: 1.1em;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
    }
    
    /* Position/size wrapper — keeps the box's footprint unchanged */
    .pwbox {
      position: relative;
      width: 100%;
      max-width: 300px;
    }

    .password-input {
      width: 100%;
      height: 50px;
      padding: 0 6px 10px;
      border: none;
      outline: none;
      background: transparent;
      color: #f7e6bd;
      font-family: 'Bodoni Moda', serif;
      font-style: italic;
      font-size: 26px;
      letter-spacing: 0.06em;
      text-align: center;
      caret-color: #e8c583;
      transition: color 0.3s;
      margin: 0;
    }

    .password-input::placeholder {
      color: rgba(232, 197, 131, 0.6);
      font-style: italic;
      text-align: center;
    }

    .password-input:focus {
      outline: none;
    }

    .password-input-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
      position: relative;
    }

    /* underline: a static hairline + a shimmering gold bar */
    .pwbox__line {
      height: 1px;
      background: rgba(232, 197, 131, 0.30);
    }
    .pwbox__glow {
      height: 2px;
      margin-top: -1.5px;
      background: linear-gradient(90deg, transparent, #f5deb0, #e8c583, transparent);
      background-size: 180% 100%;
      box-shadow: 0 0 10px rgba(232, 197, 131, 0.55);
      animation: pw-shimmer 3.5s linear infinite;
    }

    /* success message that replaces the typed text */
    .pwbox__welcome {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bodoni Moda', serif;
      font-style: italic;
      font-size: 26px;
      letter-spacing: 0.06em;
      color: #f0d59a;
      opacity: 0;
      transform: translateY(4px);
      pointer-events: none;
      transition: opacity .4s ease, transform .4s ease;
    }

    /* sparkles thrown up while typing / on success */
    .pwbox__sparks {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .pwbox__sparks span {
      position: absolute;
      bottom: 14px;
      border-radius: 50%;
      background: #f5deb0;
      box-shadow: 0 0 8px #e8c583;
      opacity: 0;
    }

    /* state classes toggled by JS */
    .pwbox.is-error { animation: pw-shake .5s ease; }
    .pwbox.is-success .pwbox__welcome { opacity: 1; transform: translateY(0); }
    .pwbox.is-success .password-input { color: transparent; caret-color: transparent; }
    .pwbox.is-success .password-input::-ms-reveal,
    .pwbox.is-success .password-input::-ms-clear { display: none; }
    .pwbox.is-typing .pwbox__sparks span,
    .pwbox.is-success .pwbox__sparks span { animation: pw-spark 1.1s ease-out; }

    @keyframes pw-shimmer {
      0% { background-position: -120% 0; }
      100% { background-position: 220% 0; }
    }
    @keyframes pw-shake {
      0%,100% { transform: translateX(0); }
      15% { transform: translateX(-9px) rotate(-.4deg); }
      30% { transform: translateX(8px) rotate(.4deg); }
      45% { transform: translateX(-7px); }
      60% { transform: translateX(6px); }
      75% { transform: translateX(-4px); }
      90% { transform: translateX(2px); }
    }
    @keyframes pw-spark {
      0%   { transform: translateY(6px) scale(0.4); opacity: 0; }
      30%  { opacity: 1; }
      100% { transform: translateY(-34px) scale(1); opacity: 0; }
    }

    /* success fallback color (overridden to transparent by .is-success) */
    .password-input.granted {
      color: #f0d59a;
    }
    
    .btn {
      background: rgba(68, 68, 68, 0.7);
      color: white;
      border: none;
      padding: 0;
      font-size: 24px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      font-weight: bold;
      width: 50px;
      height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      line-height: 1;
      backdrop-filter: blur(10px);
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(68, 68, 68, 0.4);
      background: rgba(68, 68, 68, 0.85);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .error-message {
      color: rgba(232, 197, 131, 0.9);
      margin-top: 15px;
      font-size: 14px;
      min-height: 20px;
      font-family: 'Bodoni Moda', serif;
      font-style: italic;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7);
    }
    
    /* ========== MAIN CONTENT STYLES ========== */
    /* Main content sits behind video/password, already in position */
    .main-content {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg);
      font-family: 'Raleway', sans-serif;
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 50;
    }
    
    /* When shown - just display it, no animation */
    .main-content.shown {
      display: block;
    }
    
    /* Mobile: flex container for title bar + scroll area */
    @media (max-width: 768px) {
      .main-content.shown {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
    }
    
    /* Site Header */
    .site-header {
      text-align: center;
      padding: 52px 20px 24px;
      background: var(--bg);
    }

    .site-header .kicker {
      font-family: var(--script);
      font-size: 2.1em;
      line-height: 1;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .site-title {
      font-family: var(--serif);
      font-size: 4.6em;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: 0.01em;
      line-height: 1;
      margin-bottom: 16px;
    }

    .site-title .ampersand {
      font-style: normal;
    }

    .site-date {
      font-family: var(--sans);
      font-size: 0.85em;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .site-date .dot { color: var(--accent); margin: 0 6px; }

    .site-date-mobile {
      display: none;
    }

    @media (max-width: 768px) {
      .site-date {
        display: none;
      }

      .site-header .kicker { font-size: 1.7em; }
      .site-title { font-size: 2.4em; }

      .site-date-mobile {
        display: block;
        font-family: var(--sans);
        font-size: 0.72em;
        font-weight: 500;
        color: var(--muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        text-align: center;
        white-space: nowrap;
      }

      .site-date-mobile .dot { color: var(--accent); margin: 0 5px; }
    }
    
    /* Hide mobile elements on desktop */
    .mobile-top-bar,
    .mobile-menu,
    .mobile-scroll-container {
      display: none;
    }
    
    /* Desktop Navigation */
    .site-nav {
      display: flex;
      justify-content: center;
      gap: 38px;
      padding: 16px 20px;
      margin: 8px auto 0;
      max-width: 820px;
      background: var(--bg);
      border-top: 1px solid var(--hair);
      border-bottom: 1px solid var(--hair);
    }

    .site-nav a {
      font-family: var(--sans);
      font-size: 0.78em;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 3px 0;
      border-bottom: 2px solid transparent;
      transition: color 0.25s, border-color 0.25s;
    }

    .site-nav a:hover {
      color: var(--ink);
    }

    .site-nav a.active {
      color: var(--ink);
      font-weight: 600;
      border-bottom: 2px solid var(--accent);
    }
    
    /* Mobile top bar - flex item with fixed size */
    .mobile-top-bar {
      display: none;
      width: 100%;
      height: 60px;
      min-height: 60px;
      max-height: 60px; /* Prevent growing */
      flex-shrink: 0; /* Prevent shrinking */
      flex-grow: 0; /* Prevent growing */
      background: var(--bg);
      z-index: 1001;
      border-bottom: 1px solid var(--hair);
      touch-action: manipulation;
      position: relative;
    }
    
    /* Mobile countdown bar */
    .mobile-countdown {
      display: none;
      width: 100%;
      padding: 5px 20px;
      background: var(--bg);
      border-bottom: 1px solid #eee;
      align-items: center;
      justify-content: space-around;
      font-family: 'Raleway', sans-serif;
      font-size: 0.9em;
      color: #333;
    }
    
    .countdown-label-left {
      font-family: 'Bodoni Moda', serif;
      font-size: 1.5em;
      font-weight: 400;
      letter-spacing: 1px;
      color: #333;
    }
    
    .countdown-timer {
      display: flex;
      gap: 12px;
    }
    
    .countdown-unit {
      text-align: center;
    }
    
    .countdown-number {
      font-family: 'Bodoni Moda', serif;
      font-size: 1.4em;
      font-weight: 600;
      color: #f3722b;
      display: block;
      font-variant-numeric: tabular-nums;
    }
    
    .countdown-label {
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
    }
    
    /* Mobile hero photo */
    .mobile-hero-photo {
      display: none;
      width: 100%;
      overflow: hidden;
    }
    
    .mobile-hero-photo img {
      width: 100%;
      height: auto;
      display: block;
      filter: brightness(1.1);
    }
    
    .mobile-top-bar-title {
      position: absolute;
      top: 58%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Sacramento', cursive;
      font-size: 2em;
      font-weight: 400;
      letter-spacing: 1px;
      color: var(--accent);
      text-transform: lowercase;
      white-space: nowrap;
    }

    
    /* Desktop scroll container - full page scrollable */
    .desktop-scroll-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--bg);
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE/Edge */
      /* Sticky-footer column: footer sits at the bottom of short pages */
      display: flex;
      flex-direction: column;
    }

    /* Grow to fill so the footer is pushed to the bottom on short pages */
    .desktop-sections { flex: 1 0 auto; }
    
    .desktop-scroll-container::-webkit-scrollbar {
      display: none; /* Chrome/Safari/Opera */
    }
    
    /* Mobile scroll container */
    .mobile-scroll-container {
      display: none;
      background: var(--bg);
    }
    
    /* Mobile hamburger button */
    .hamburger {
      display: none;
      position: absolute;
      top: 50%;
      left: 15px;
      transform: translateY(-50%);
      z-index: 1002;
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    
    /* Large clickable area for hamburger menu */
    .hamburger-click-area {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 25%;
      height: 100%;
      z-index: 1001;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    
    .hamburger span {
      display: block;
      width: 25px;
      height: 2px;
      background: #333;
      margin: 5px 0;
      transition: all 0.3s;
    }
    
    .hamburger.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }
    
    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }
    
    .hamburger.active span:nth-child(3) {
      transform: rotate(-45deg) translate(5px, -5px);
    }
    
    /* Mobile menu overlay */
    .mobile-menu {
      display: none;
      position: fixed;
      top: 60px;
      left: 0;
      width: 100%;
      height: calc(100% - 60px);
      background: var(--bg);
      z-index: 1000;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }
    
    .mobile-menu.active {
      opacity: 1;
      visibility: visible;
    }
    
    /* Icon scroller in mobile menu */
    .menu-icon-scroller {
      position: absolute;
      bottom: 5vh;
      left: 0;
      width: 100%;
      overflow: hidden;
      padding: 20px 0;
    }
    
    .menu-icon-scroller-top {
      position: absolute;
      top: 4vh;
      left: 0;
      width: 100%;
      overflow: hidden;
      padding: 20px 0;
    }
    
    .icon-track {
      display: flex;
      animation: scroll-icons 20s linear infinite;
      width: fit-content;
    }
    
    .icon-track-reverse {
      display: flex;
      animation: scroll-icons-reverse 20s linear infinite;
      width: fit-content;
    }
    
    .icon-track img,
    .icon-track-reverse img {
      height: 40px;
      width: 40px;
      margin: 0 25px;
      display: inline-block;
      filter: brightness(0) saturate(100%) invert(48%) sepia(85%) saturate(1703%) hue-rotate(347deg) brightness(98%) contrast(93%);
    }
    
    /* Desktop vertical icon scrollers */
    .desktop-icon-scroller {
      position: fixed;
      top: 0;
      width: 50px;
      height: 100vh;
      overflow: hidden;
      z-index: 10;
      pointer-events: none;
    }
    
    .desktop-icon-scroller.left {
      left: 25px;
    }
    
    .desktop-icon-scroller.right {
      right: 25px;
    }
    
    .desktop-icon-track {
      display: flex;
      flex-direction: column;
      animation: scroll-icons-vertical 15s linear infinite;
    }
    
    .desktop-icon-track-reverse {
      display: flex;
      flex-direction: column;
      animation: scroll-icons-vertical-reverse 15s linear infinite;
    }
    
    .desktop-icon-track img,
    .desktop-icon-track-reverse img {
      width: 36px;
      height: 36px;
      margin: 20px auto;
      display: block;
      filter: brightness(0) saturate(100%) invert(48%) sepia(85%) saturate(1703%) hue-rotate(347deg) brightness(98%) contrast(93%);
      opacity: 0.7;
    }
    
    @keyframes scroll-icons-vertical {
      0% {
        transform: translateY(0);
      }
      100% {
        transform: translateY(-50%);
      }
    }
    
    @keyframes scroll-icons-vertical-reverse {
      0% {
        transform: translateY(-50%);
      }
      100% {
        transform: translateY(0);
      }
    }
    
    /* Hide desktop scrollers on mobile */
    @media (max-width: 768px) {
      .desktop-icon-scroller {
        display: none;
      }
    }
    
    /* Hide on narrower desktops where they'd overlap content */
    @media (max-width: 1000px) {
      .desktop-icon-scroller {
        display: none;
      }
    }
    
    @keyframes scroll-icons-reverse {
      0% {
        transform: translateX(-50%);
      }
      100% {
        transform: translateX(0);
      }
    }
    
    @keyframes scroll-icons {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-50%);
      }
    }
    
    .mobile-menu-header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .mobile-menu-title {
      font-family: 'Raleway', sans-serif;
      font-size: 0.9em;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #333;
      margin-bottom: 30px;
    }
    
    .mobile-menu-couple {
      font-family: 'Bodoni Moda', serif;
      font-size: 2.5em;
      font-weight: 400;
      color: #1a1a1a;
      line-height: 1.3;
    }
    
    .mobile-menu-couple .ampersand {
      font-style: normal;
    }
    
    .mobile-menu-date {
      font-family: 'Raleway', sans-serif;
      font-size: 0.85em;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #333;
      margin-top: 15px;
    }
    
    .mobile-menu nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
      position: relative;
      padding: 80px 0;
    }
    
    .mobile-menu nav a {
      font-family: 'Raleway', sans-serif;
      font-size: 1.1em;
      font-weight: 400;
      color: #333;
      text-decoration: none;
      letter-spacing: 1px;
    }
    
    .mobile-menu nav a.active {
      border-bottom: 2px solid #f3722b;
      padding-bottom: 2px;
      font-weight: 600;
    }
    
    /* Page sections */
    .page-section {
      display: none;
      padding: 0 20px 60px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .page-section.active {
      display: block;
    }
    
    /* Mobile: sections container and page sections fill available height */
    @media (max-width: 768px) {
      .mobile-sections {
        /* Grow to fill the space above the footer (sticky footer), but let
           content taller than the viewport push past and scroll. */
        flex: 1 0 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      /* Sections must fill the full mobile width. In the flex column the base
         `margin: 0 auto` is an auto cross-margin, which collapses each section
         to its content width; reset it so they stretch edge to edge. */
      .mobile-sections .page-section {
        margin: 0;
        max-width: none;
        align-self: stretch;
      }

      /* Active section is its natural height on normal pages; the fill-screen
         pages (photos/registry) opt into flex:1 via their own rules below. */
      .mobile-scroll-container .page-section.active {
        display: block;
      }
    }
    
    .page-section h2 {
      font-family: 'Bodoni Moda', serif;
      font-size: 2.5em;
      font-weight: 400;
      color: #1a1a1a;
      text-align: center;
      margin-bottom: 40px;
    }
    
    .page-section p {
      font-family: 'Raleway', sans-serif;
      font-size: 1.1em;
      line-height: 1.8;
      color: #444;
      max-width: 800px;
      margin: 0 auto 20px;
    }
    
    /* ===== Home: hero + countdown overlay ===== */
    .hero-block {
      max-width: 820px;
      margin: 28px auto 0;
    }

    .hero {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
    }

    .hero-img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      object-position: center bottom;
      display: block;
      filter: brightness(1.05);
    }

    .hero-scrim {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10, 8, 6, 0) 42%, rgba(10, 8, 6, 0.72) 100%);
    }

    .hero-countdown {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 24px;
      text-align: center;
      color: #fff;
    }

    .hero-countdown .cd-lbl {
      font-family: var(--sans);
      font-size: 0.68em;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.82);
    }

    .cd-clock {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 24px;
    }

    .cd-unit { text-align: center; }

    .cd-num {
      font-family: var(--serif);
      font-size: 2.5em;
      line-height: 1;
      display: inline-block;
      min-width: 1.6em;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .cd-num.days { min-width: 2.2em; }
    .cd-num.hl { color: #ffd7ad; }

    .cd-u {
      display: block;
      font-family: var(--sans);
      font-size: 0.6em;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.78);
      margin-top: 6px;
    }

    .cd-sep {
      font-family: var(--serif);
      font-size: 2.5em;
      line-height: 1;
      color: rgba(255, 255, 255, 0.4);
    }

    /* ===== Home: schedule of events ===== */
    .sched-head {
      text-align: center;
      padding: 44px 0 6px;
    }

    .sched-head .kicker {
      font-family: var(--script);
      font-size: 1.9em;
      line-height: 1;
      color: var(--accent);
    }

    .sched-head h2 {
      margin: 6px 0 0;
      font-family: var(--serif);
      font-weight: 500;
      font-size: 2em;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .events-list {
      max-width: 760px;
      margin: 0 auto;
    }

    .event {
      display: grid;
      grid-template-columns: 140px 1px 1fr;
      gap: 30px;
      padding: 28px 0;
      border-top: 1px solid var(--hair);
      text-align: left;
    }

    .event:last-child { border-bottom: 1px solid var(--hair); }

    .event .when { text-align: right; }

    .event .when .d {
      font-family: var(--serif);
      font-size: 0.95em;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .event .when .m {
      font-size: 0.78em;
      letter-spacing: 0.1em;
      color: var(--faint);
      margin-top: 4px;
    }

    .event .rule { background: var(--hair); }

    .event h3 {
      margin: 0;
      font-family: var(--serif);
      font-weight: 500;
      font-size: 1.55em;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .event .time {
      margin-top: 6px;
      font-family: var(--sans);
      font-size: 0.98em;
      color: #4a433d;
      line-height: 1.5;
    }

    /* Desktop keeps the <br> two-line time; the mobile "For a" joiner is hidden */
    .event .time .tj { display: none; }

    .event .venue {
      margin-top: 4px;
      font-family: var(--sans);
      font-size: 0.98em;
    }

    .event .venue a {
      color: var(--accent);
      font-weight: 500;
      text-decoration: none;
      white-space: nowrap;
    }

    .event .venue a:hover { color: var(--accent-dark); }

    .event .after {
      margin-top: 8px;
      font-family: var(--sans);
      font-size: 0.98em;
      color: #4a433d;
      line-height: 1.5;
    }

    .event .addr {
      margin-top: 3px;
      font-family: var(--sans);
      font-size: 0.88em;
      color: var(--faint);
    }

    .chip {
      display: inline-block;
      margin-top: 12px;
      font-family: var(--sans);
      font-size: 0.72em;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid rgba(28, 25, 23, 0.2);
      border-radius: 999px;
      padding: 5px 12px;
    }

    /* ===== Site footer (shown at the bottom of every page) ===== */
    .site-footer {
      /* Desktop: match the nav/title bar width (both are max-width 820px,
         centered), so the footer band lines up under the nav. */
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 20px 48px;
      text-align: center;
      background: var(--bg-alt);
    }

    .site-footer .mono {
      font-family: var(--serif);
      font-size: 1.5em;
      letter-spacing: 0.14em;
      color: var(--ink);
    }

    .site-footer .mono .dot { color: var(--accent); }

    .site-footer .script {
      margin-top: 10px;
      font-family: var(--script);
      font-size: 1.7em;
      color: var(--accent);
    }

    .site-footer .sub {
      margin-top: 8px;
      font-family: var(--sans);
      font-size: 0.72em;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--faint);
    }

    /* Map link (SVG pin) — kept for inline use */
    .map-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      transition: transform 0.2s, color 0.2s;
    }

    .map-link:hover {
      transform: scale(1.15);
      color: var(--accent-dark);
    }

    .map-link svg {
      width: 18px;
      height: 18px;
      display: block;
    }
    
    /* Photo grid */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 40px;
    }
    
    .photo-grid img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }
    
    /* ===================== Photo gallery ===================== */
    .photos-root { max-width: 940px; margin: 0 auto; padding: 0 20px; }

    /* mode toggle pill */
    .pg-toggle { display: flex; justify-content: center; padding: 6px 0 26px; }
    .pg-toggle-inner {
      display: inline-flex; background: var(--bg-alt);
      border-radius: 999px; padding: 4px;
    }
    .pg-tab {
      font-family: var(--sans); font-size: 0.72em; letter-spacing: 0.14em;
      text-transform: uppercase; font-weight: 600; padding: 9px 20px;
      border: none; border-radius: 999px; cursor: pointer;
      background: transparent; color: var(--muted);
      transition: background 0.25s, color 0.25s; white-space: nowrap;
    }
    .pg-tab.active {
      background: var(--accent); color: var(--bg);
      box-shadow: 0 3px 8px rgba(243, 114, 43, 0.35);
    }
    /* swipe is a mobile-only mode */
    .pg-tab[data-mode="swipe"] { display: none; }

    /* panels */
    .pg-panel { display: none; }
    .pg-panel.active { display: block; }

    /* ---- gallery (masonry) ---- */
    .pg-grid { column-count: 3; column-gap: 14px; padding-bottom: 8px; }
    .pg-cell {
      display: block; width: 100%; break-inside: avoid; margin: 0 0 14px;
      padding: 0; border: none; border-radius: 4px; overflow: hidden;
      cursor: zoom-in; background: none; box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
    }
    .pg-cell img { display: block; width: 100%; height: auto; }

    /* ---- slideshow ---- */
    /* Desktop: image sits at stage height with a drop shadow (no tan letterbox) */
    .pg-stage { position: relative; height: 560px; }
    .pg-slide {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      height: 100%; width: auto; max-width: 100%; object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 18px 44px rgba(28, 25, 23, 0.28), 0 4px 12px rgba(28, 25, 23, 0.16);
      opacity: 0; transition: opacity 0.8s ease;
    }
    .pg-slide.show { opacity: 1; }
    .pg-controls {
      display: flex; align-items: center; justify-content: center;
      gap: 20px; padding: 22px 0 6px;
    }
    .pg-nav, .pg-play {
      border-radius: 50%; cursor: pointer; display: inline-flex;
      align-items: center; justify-content: center; line-height: 1;
    }
    .pg-nav {
      width: 48px; height: 48px; border: 1px solid rgba(28, 25, 23, 0.18);
      background: #fff; color: var(--ink); font-size: 20px;
    }
    .pg-play {
      width: 52px; height: 52px; border: none; background: var(--accent);
      color: #fff; font-size: 14px; box-shadow: 0 8px 20px rgba(243, 114, 43, 0.35);
    }
    .pg-count {
      margin-left: 6px; font-family: var(--serif); font-size: 1em;
      color: var(--muted); font-variant-numeric: tabular-nums;
    }

    /* ---- swipe (mobile) ---- */
    .pg-swipe-stack { position: relative; height: 62vh; margin: 6px 6px 0; }
    .pg-swipe-done {
      position: absolute; inset: 0; z-index: 0;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 0 30px;
    }
    .pg-done-title { font-family: var(--script); font-size: 2.1em; color: var(--accent); line-height: 1.1; }
    .pg-done-sub { margin-top: 6px; font-size: 0.72em; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint); }
    .pg-reset {
      margin-top: 18px; font-family: var(--sans); font-size: 0.72em; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
      background: transparent; border: 1px solid rgba(28, 25, 23, 0.25);
      border-radius: 999px; padding: 9px 20px; cursor: pointer;
    }
    .pg-card {
      position: absolute; inset: 0; border-radius: 20px; overflow: hidden;
      background: #fff; box-shadow: 0 20px 44px rgba(0, 0, 0, 0.28);
      touch-action: pan-y; will-change: transform;
    }
    .pg-card img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
    .pg-stamp {
      position: absolute; top: 24px; pointer-events: none; font-family: var(--sans);
      font-weight: 800; font-size: 1.6em; letter-spacing: 0.1em; padding: 8px 18px;
      border: 3px solid #fff; border-radius: 12px; text-transform: uppercase; color: #fff; opacity: 0;
    }
    .pg-stamp.love { left: 18px; transform: rotate(-14deg); background: #3f9d5a; }
    .pg-stamp.nope { right: 18px; transform: rotate(14deg); background: var(--accent); }
    .pg-scrim {
      position: absolute; left: 0; right: 0; bottom: 0; height: 96px; pointer-events: none;
      background: linear-gradient(180deg, rgba(10,8,6,0) 0%, rgba(10,8,6,0.55) 100%);
    }
    .pg-counts {
      position: absolute; left: 14px; right: 14px; bottom: 14px;
      display: flex; justify-content: space-between; pointer-events: none;
    }
    .pg-chip {
      display: inline-flex; align-items: center; gap: 6px; font-family: var(--sans);
      font-weight: 700; font-size: 0.85em; color: #fff; padding: 6px 12px;
      border-radius: 999px; font-variant-numeric: tabular-nums;
    }
    .pg-chip.nope { background: rgba(243, 114, 43, 0.9); }
    .pg-chip.love { background: rgba(63, 157, 90, 0.9); }
    .pg-swipe-controls {
      display: flex; align-items: center; justify-content: center; gap: 26px; padding: 22px 0 10px;
    }
    .pg-swipe-controls button {
      width: 60px; height: 60px; border-radius: 50%; cursor: pointer; font-size: 24px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .pg-nope { border: 1px solid rgba(243,114,43,0.35); background: #fff; color: var(--accent); box-shadow: 0 6px 16px rgba(0,0,0,0.1); }
    .pg-like { border: none; background: #3f9d5a; color: #fff; font-size: 26px; box-shadow: 0 8px 20px rgba(63,157,90,0.4); }

    /* ---- lightbox (shared, appended once) ---- */
    .pg-lightbox {
      position: fixed; inset: 0; z-index: 1200; background: rgba(10, 8, 6, 0.92);
      display: none; align-items: center; justify-content: center; padding: 40px;
    }
    .pg-lightbox.open { display: flex; }
    .pg-lightbox img {
      max-width: 92vw; max-height: 88vh; object-fit: contain;
      border-radius: 6px; box-shadow: 0 24px 70px rgba(0,0,0,0.7);
    }
    .pg-lb-btn {
      position: absolute; background: rgba(255,255,255,0.12); color: #fff; border: none;
      cursor: pointer; width: 52px; height: 52px; border-radius: 50%; font-size: 26px;
      line-height: 1; display: inline-flex; align-items: center; justify-content: center;
    }
    .pg-lb-btn:hover { background: rgba(255,255,255,0.22); }
    .pg-lb-prev { left: 20px; top: 50%; transform: translateY(-50%); }
    .pg-lb-next { right: 20px; top: 50%; transform: translateY(-50%); }
    .pg-lb-close { top: 20px; right: 20px; width: 44px; height: 44px; font-size: 22px; }

    /* Photos page: hide the big mobile header (consistent with other inner pages) */
    @media (max-width: 768px) {
      .photos-page-active .mobile-scroll-container .site-header { display: none; }

      .photos-root { padding: 0 16px; }
      .pg-grid { column-count: 2; column-gap: 10px; }
      .pg-cell { margin-bottom: 10px; box-shadow: 0 5px 14px rgba(0,0,0,0.12); }
      /* Mobile: bigger, a rounded card that cover-fills, with a drop shadow */
      .pg-stage {
        height: 64vh; border-radius: 14px; overflow: hidden;
        box-shadow: 0 16px 38px rgba(28, 25, 23, 0.26), 0 4px 12px rgba(28, 25, 23, 0.14);
      }
      .pg-slide {
        top: 0; left: 0; transform: none; inset: 0;
        width: 100%; height: 100%; object-fit: cover;
        border-radius: 0; box-shadow: none;
      }
      .pg-tab { font-size: 0.64em; padding: 9px 15px; letter-spacing: 0.1em; }
      .pg-tab[data-mode="swipe"] { display: inline-block; }  /* swipe shown on mobile */

      /* Swipe/Slideshow: full-height media, no footer (Gallery keeps the footer) */
      .photos-page-active.pg-immersive .site-footer { display: none; }
    }
    
    /* Registry Coming Soon styles */
    .registry-coming-soon {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      padding: 40px 20px;
    }
    
    .registry-circle {
      position: relative;
      width: 280px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .registry-text {
      text-align: center;
      z-index: 1;
    }
    
    .registry-text span {
      font-family: 'Sacramento', cursive;
      font-size: 3.5em;
      color: #1a1a1a;
      display: block;
      line-height: 1.1;
    }
    
    .registry-text span:first-child {
      padding-top: 10px;
    }
    
    .registry-icons-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      animation: registry-spin 20s linear infinite;
    }
    
    @keyframes registry-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    @keyframes registry-counter-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    
    .registry-icon-wrapper {
      position: absolute;
      width: 36px;
      height: 36px;
      top: 50%;
      left: 50%;
      margin-left: -18px;
      margin-top: -18px;
    }
    
    .registry-icon-wrapper:nth-child(1) { transform: rotate(0deg) translateY(-120px); }
    .registry-icon-wrapper:nth-child(2) { transform: rotate(45deg) translateY(-120px); }
    .registry-icon-wrapper:nth-child(3) { transform: rotate(90deg) translateY(-120px); }
    .registry-icon-wrapper:nth-child(4) { transform: rotate(135deg) translateY(-120px); }
    .registry-icon-wrapper:nth-child(5) { transform: rotate(180deg) translateY(-120px); }
    .registry-icon-wrapper:nth-child(6) { transform: rotate(225deg) translateY(-120px); }
    .registry-icon-wrapper:nth-child(7) { transform: rotate(270deg) translateY(-120px); }
    .registry-icon-wrapper:nth-child(8) { transform: rotate(315deg) translateY(-120px); }
    
    .registry-icon {
      width: 100%;
      height: 100%;
      /* Use mask instead of filter for consistent color across iOS/Android */
      background-color: #f3722b;
      -webkit-mask-image: var(--icon-src);
      mask-image: var(--icon-src);
      -webkit-mask-size: contain;
      mask-size: contain;
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-position: center;
      animation: registry-counter-spin 20s linear infinite;
    }
    
    /* Hide the actual img, show the masked div */
    .registry-icon-wrapper img.registry-icon {
      opacity: 0;
    }
    
    .registry-icon-wrapper::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #f3722b;
      -webkit-mask-size: contain;
      mask-size: contain;
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-position: center;
      animation: registry-counter-spin 20s linear infinite;
    }
    
    .registry-icon-wrapper:nth-child(1)::before { -webkit-mask-image: url('icons/registry/gift.svg'); mask-image: url('icons/registry/gift.svg'); animation-delay: 0s; }
    .registry-icon-wrapper:nth-child(2)::before { -webkit-mask-image: url('icons/registry/home.svg'); mask-image: url('icons/registry/home.svg'); animation-delay: -2.5s; }
    .registry-icon-wrapper:nth-child(3)::before { -webkit-mask-image: url('icons/registry/frying-pan.svg'); mask-image: url('icons/registry/frying-pan.svg'); animation-delay: -5s; }
    .registry-icon-wrapper:nth-child(4)::before { -webkit-mask-image: url('icons/registry/plates.svg'); mask-image: url('icons/registry/plates.svg'); animation-delay: -7.5s; }
    .registry-icon-wrapper:nth-child(5)::before { -webkit-mask-image: url('icons/registry/pot-and-lid.svg'); mask-image: url('icons/registry/pot-and-lid.svg'); animation-delay: -10s; }
    .registry-icon-wrapper:nth-child(6)::before { -webkit-mask-image: url('icons/registry/knife.svg'); mask-image: url('icons/registry/knife.svg'); animation-delay: -12.5s; }
    .registry-icon-wrapper:nth-child(7)::before { -webkit-mask-image: url('icons/registry/electric-mixer.svg'); mask-image: url('icons/registry/electric-mixer.svg'); animation-delay: -15s; }
    .registry-icon-wrapper:nth-child(8)::before { -webkit-mask-image: url('icons/registry/sedan.svg'); mask-image: url('icons/registry/sedan.svg'); animation-delay: -17.5s; }
    
    /* Animation delays now set in ::before rules above */
    
    /* Mobile: Registry page fills available space */
    @media (max-width: 768px) {
      .registry-page-active .mobile-scroll-container .site-header {
        display: none;
      }
      
      .registry-page-active .mobile-scroll-container {
        display: flex !important;
        flex-direction: column;
        height: 100%;
      }

      /* Take only the space above the footer so the footer stays visible */
      .registry-page-active .mobile-sections {
        flex: 1;
        height: auto;
        min-height: 0;
      }

      .registry-page-active #section-registry {
        flex: 1;
        display: flex !important;
        min-height: 0;
      }
      
      .registry-page-active .registry-coming-soon {
        flex: 1;
        width: 100%;
        min-height: 0;
        padding: 20px;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    }
    
    /* Q+A FAQ Accordion styles */
    .qa-container {
      max-width: 700px;
      margin: 0 auto;
      margin-top: 20px;
    }
    
    .qa-item {
      margin-bottom: 15px;
      border-radius: 8px;
      overflow: hidden;
    }
    
    .qa-question {
      background: #f3722b;
      color: #fff;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      cursor: pointer;
      font-family: 'Raleway', sans-serif;
      font-size: 1.05em;
      font-weight: 500;
      transition: background 0.2s;
    }
    
    .qa-question:hover {
      background: #e5621a;
    }
    
    .qa-icon {

    /* Mobile: hide header on Q+A page */
    @media (max-width: 768px) {
      .qa-page-active .mobile-scroll-container .site-header {
        display: none;
      }
    }
    
    /* Mobile: hide header on Travel page */
    @media (max-width: 768px) {
      .travel-page-active .mobile-scroll-container .site-header {
        display: none;
      }
      
      .travel-page-active .travel-container {
        padding-top: 30px;
      }
    }
    
    /* Hotels & Travel page styles */
    .travel-container {
      max-width: 800px;
      margin: 0 auto;
      padding-bottom: 60px;
    }
    
    .travel-section {
      margin-bottom: 50px;
    }
    
    .travel-section h2 {
      font-family: 'Bodoni Moda', serif;
      font-size: 2em;
      font-weight: 400;
      color: #1a1a1a;
      text-align: center;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }
    
    .section-subtext {

  <!-- Video Background (only visible on password page) -->

  <script>
    // Mobile video height is now handled by CSS using 100dvh (dynamic viewport height)
    // This properly handles iOS keyboard open/close without JavaScript manipulation
    
    // Encrypted wedding content (generated by build.js)
    const ENCRYPTED_DATA = '{"salt":"780210be870a2e0da53b8d88e0375e6b","iv":"04fa97c84dcbd02761c7fafbeee44103","authTag":"a3ed462ee96137ede9b7274122041eea","content":"3157a5bb1228b475e0989ea3f78bb0ec378fb4442d2ccf92f1ad309470c8b5f884db1f13f29d76bca8f0eb17cb783849a453f83d86ba38a0160006c675de7a8585d5b39cc40cf604f17045b310813a58f774cc6ddc959e423998d86285eeda374a257b3bc6c9e58af65f25bec9a297f5db3879437240b185ae7707061d1c161d155f2e701204cfaca80fb6de68abcf528dba7b0b5f65414e91d5c65e98775c258efd8569cfdf6d17bd24987af686ad4737cb697848c389cd9c8350e93fba21096800d1dc5411447da72303e52dc48bca389fe1d36ac4739af7c3e413e657b1cd5725ea11e4278655573a24b4bd15c9c943b66d5150320bdc374f243cf29e1587e55ec5e7d4f18abb51233e52d60e54469346adf283dee7a4e9e42f1f05612be3c23fb9fab6780fe32f8eb7f3e8b2e1232ef8a63441246f3c9982d4455bd4e60907c72a213686b7fcfdaea2cac7b50a86e0833cef30c9e9471a850b024aec33ee6b374361e8ccd57aa490e0351aeb1da9890dcc7e2209123c782ca8a8534837e05728ba9aa67069d72e5e43515b3536f76b4b28a9fd07be9691a4b8d87c7cf0b39c7422ca7205cfa63835feaa967b881f5dd4cdaaddeef4a9fedf4483e53805190530e4508046a1b39576570683af8a7e1380650725d95362a1c51381129853db76b4d20abb57997ec97129d8e174d2cccf394f983742da8afffb2b4deb914044f5e94c36eb11a163da4fb79916f99e35a22146cc8958f1c8c5cce6ce4aa80c5884592cc2f7695731dc0d2de06e6740a114e60178c81c9e876c42128b852728e36f86f7d3628d518bf62057efce5ff975c613c5f046400bf6895f2d9434f3bbebb73627f488e0965cac97c062d27ad354ef3d03f36ce93d620ba08d88db4232c43ef59fcc0311da2b9f004e8be50d6db1c66969d93e10ff310d343236900d342fc6aa53fe902fb2e76c331a4c4c768b23841cac0ee9e4d44d961b9a13ac38dbc1229cf8e5096bf2a6a0560158f9552bb296f71f700c03cb084dde1e2a169698692db8033c40b3eed8134a20962a90764c1c4d0fa070687726520e3818360517e41d83fe66faf0448f124dcc330ced235f35fd9ec5fd1692bb09b8d8bc36bda43c39038c7fd028cf1426c4a9d22822cf742e62abbbedf8ab0489b34a67340b851df72f6f1a38fa5686c08bcf3a10deffa97e5c66be22128d9c798ea803f0645cb249cbdd895f2c2c970d6a5059fb129edb8241ac355842ce4a73edcc4731b9bbddaa27b8ffa60daa9ced166052165e7737258ae58c068088a98cb75233a5c6cc21fd038be8fb0224e86940ee29097dd946158bbce6fc5c02c0897be673c602590c4468af301287929edd10dcb2a1c96ad8c53f9f6a5bc78fc4c0ba77071e3b6703668d4bdb5905f01873a4a38cd47854cbf90cbc25a5146f943f78b2bf0077d057135c0bee0249c86262765955d7869390e0db7da70c3a86857a22d1610c71a1a1244b6ea976cf249839"}';
    
    // Decrypt function using Web Crypto API
    async function decryptContent(password, encryptedPayload) {
      try {
        const { salt, iv, authTag, content } = JSON.parse(encryptedPayload);
        
        // Convert hex strings back to bytes
        const saltBytes = hexToBytes(salt);
        const ivBytes = hexToBytes(iv);
        const authTagBytes = hexToBytes(authTag);
        const contentBytes = hexToBytes(content);
        
        // Derive key from password using PBKDF2
        const enc = new TextEncoder();
        const passwordKey = await crypto.subtle.importKey(
          'raw',
          enc.encode(password),
          'PBKDF2',
          false,
          ['deriveBits']
        );
        
        const derivedBits = await crypto.subtle.deriveBits(
          {
            name: 'PBKDF2',
            salt: saltBytes,
            iterations: 100000,
            hash: 'SHA-256'
          },
          passwordKey,
          256
        );
        
        const key = await crypto.subtle.importKey(
          'raw',
          derivedBits,
          'AES-GCM',
          false,
          ['decrypt']
        );
        
        // Combine content and auth tag for GCM
        const combined = new Uint8Array(contentBytes.length + authTagBytes.length);
        combined.set(contentBytes);
        combined.set(authTagBytes, contentBytes.length);
        
        // Decrypt
        const decrypted = await crypto.subtle.decrypt(
          {
            name: 'AES-GCM',
            iv: ivBytes,
            tagLength: 128
          },
          key,
          combined
        );
        
        const dec = new TextDecoder();
        return dec.decode(decrypted);
      } catch (error) {
        return null;
      }
    }
    
    function hexToBytes(hex) {
      const bytes = new Uint8Array(hex.length / 2);
      for (let i = 0; i < hex.length; i += 2) {
        bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
      }
      return bytes;
    }
    
    // Debounce timer for auto-checking password as user types
    let passwordCheckTimer = null;
    
    let sparkTimer = null;

    async function checkPasswordAsYouType() {
      const errorMsg = document.getElementById('errorMessage');
      errorMsg.textContent = ''; // Clear error message while typing

      // Brief sparkle burst while typing
      const pwbox = document.getElementById('pwbox');
      if (pwbox && !pwbox.classList.contains('is-success')) {
        pwbox.classList.remove('is-error');
        pwbox.classList.add('is-typing');
        clearTimeout(sparkTimer);
        sparkTimer = setTimeout(() => pwbox.classList.remove('is-typing'), 700);
      }

      // Clear previous timer
      if (passwordCheckTimer) {
        clearTimeout(passwordCheckTimer);
      }
      
      // Wait 300ms after user stops typing before checking
      passwordCheckTimer = setTimeout(async () => {
        await checkPassword();
      }, 300);
    }
    
    async function checkPassword() {
      const passwordInput = document.getElementById('passwordInput');
      const password = passwordInput.value.toLowerCase();
      const errorMsg = document.getElementById('errorMessage');
      
      // Don't check if input is disabled (already granted access)
      if (passwordInput.disabled) {
        return;
      }
      
      if (!password) {
        return;
      }
      
      const decryptedContent = await decryptContent(password, ENCRYPTED_DATA);
      
      if (decryptedContent) {
        // Success! Reveal the gold "Welcome!" overlay
        const passwordInput = document.getElementById('passwordInput');
        const pwbox = document.getElementById('pwbox');
        pwbox.classList.remove('is-typing', 'is-error');
        pwbox.classList.add('is-success');
        passwordInput.classList.add('granted');
        passwordInput.disabled = true;

        // Close keyboard and scroll back to top first
        passwordInput.blur();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        // Wait for keyboard to close and scroll to complete, then fade
        setTimeout(async () => {
          try {
            const data = JSON.parse(decryptedContent);
            displayContent(data);
            
            // Load correct section based on current URL or redirect from 404
            let path = sessionStorage.getItem('redirect');
            if (path) {
              sessionStorage.removeItem('redirect');
            } else {
              path = window.location.pathname;
            }
            // Extract section ID from path (handle both /photos and /wedding/photos)
            const pathParts = path.split('/').filter(p => p);
            // Filter out 'wedding' base path if present
            const filteredParts = pathParts.filter(p => p !== 'wedding');
            const sectionId = filteredParts.length === 0 ? 'home' : filteredParts[filteredParts.length - 1];
            // Always show the appropriate section (including home)
            if (sectionId !== 'home') {
              showSectionFromUrl(sectionId);
            }
            // Home section is already active by default in the HTML
            
            // Show main content immediately (it's behind video, will be revealed as video fades)
            const mainContent = document.getElementById('mainContent');
            mainContent.classList.add('shown');
            
            // Fade out password box
            document.getElementById('passwordPage').classList.add('hidden');
            
            // Fade out video (content is already visible behind it)
            document.body.classList.add('content-visible');
            
            // Forward touch events from video to scroll container during fade
            const videoBackground = document.querySelector('.video-background');
            const scrollContainer = document.querySelector('.mobile-scroll-container');
            if (videoBackground && scrollContainer) {
              // Allow touch events to reach content by making video non-interactive
              videoBackground.style.pointerEvents = 'none';
              
              // For iOS: also forward touch events manually
              const forwardTouch = (e) => {
                const touch = e.touches[0];
                const target = document.elementFromPoint(touch.clientX, touch.clientY);
                if (target && target !== videoBackground) {
                  // Event will naturally go to the element below since pointer-events: none
                }
              };
              videoBackground.addEventListener('touchstart', forwardTouch, { passive: true });
              videoBackground.addEventListener('touchmove', forwardTouch, { passive: true });
            }
            
            // Remove video from DOM at 1.5s (ease-in means it's mostly faded by then)
            setTimeout(() => {
              if (videoBackground) {
                videoBackground.remove();
              }
            }, 1500);
            
            // Store success in session (not password)
            sessionStorage.setItem('authenticated', 'true');
          } catch (error) {
            console.error('Error loading content:', error);
            errorMsg.textContent = 'Error loading content: ' + error.message;
          }
        }, 800);
      } else {
        // Only show error if password seems substantial (likely complete)
        // But don't show error if input is already disabled (access granted)
        if (password.length >= 8 && !passwordInput.disabled) {
          // Shake the box, then show the error text
          const pwbox = document.getElementById('pwbox');
          pwbox.classList.remove('is-typing', 'is-error');
          void pwbox.offsetWidth; // restart the shake animation
          pwbox.classList.add('is-error');
          errorMsg.textContent = 'Incorrect password';
          // Clear after showing error briefly
          setTimeout(() => {
            document.getElementById('passwordInput').value = '';
            errorMsg.textContent = '';
            pwbox.classList.remove('is-error');
            document.getElementById('passwordInput').focus();
          }, 1500);
        }
      }
    }

            <h1 class="site-title">Meghan <span class="ampersand">&amp;</span> Nolan</h1>
            <div class="site-date-mobile">Dec 31, 2026 <span class="dot">&#10022;</span> Boston, MA</div>
          </header>
          <div class="mobile-sections">
            ${sectionsHTML}
          </div>
          <footer class="site-footer">
            <div class="mono">M <span class="dot">&#10022;</span> N</div>
            <div class="script">can&rsquo;t wait to celebrate with you</div>
            <div class="sub">December 31, 2026 &middot; Boston</div>
          </footer>
        </div>
      `;

      // Home is the default active section on load
      content.classList.add('home-page-active');

      // Start countdown timer
      startCountdown();

      // Wire up the photo gallery (both shells share one lightbox)
      initPhotoGallery();
    }

    // ===================== Photo gallery =====================
    // Rebuilt in vanilla JS from the Claude Design mock. #section-photos exists
    // in both the desktop and mobile shells, so this initializes each
    // .photos-root independently and shares a single lightbox overlay.
    var galleryLb = null;
    function photoFull(i) { return 'gallery/photo_' + i + '.jpg'; }
    function photoThumb(i) { return 'gallery/thumbs/photo_' + i + '.jpg'; }

    function ensureLightbox() {
      if (galleryLb) return galleryLb;
      var overlay = document.createElement('div');
      overlay.className = 'pg-lightbox';
      overlay.innerHTML =
        '<button type="button" class="pg-lb-btn pg-lb-close" aria-label="Close">&#10005;</button>' +
        '<button type="button" class="pg-lb-btn pg-lb-prev" aria-label="Previous">&#8249;</button>' +
        '<img alt="">' +
        '<button type="button" class="pg-lb-btn pg-lb-next" aria-label="Next">&#8250;</button>';
      var img = overlay.querySelector('img');
      var st = { idx: 1, count: 1 };
      var show = function () { img.src = photoFull(st.idx); };
      var close = function () { overlay.classList.remove('open'); };
      var step = function (d) { st.idx = ((st.idx - 1 + d + st.count) % st.count) + 1; show(); };
      overlay.querySelector('.pg-lb-close').onclick = function (e) { e.stopPropagation(); close(); };
      overlay.querySelector('.pg-lb-prev').onclick = function (e) { e.stopPropagation(); step(-1); };
      overlay.querySelector('.pg-lb-next').onclick = function (e) { e.stopPropagation(); step(1); };
      overlay.addEventListener('click', function (e) { if (e.target === overlay || e.target === img) close(); });
      document.addEventListener('keydown', function (e) {
        if (!overlay.classList.contains('open')) return;
        if (e.key === 'Escape') close();
        else if (e.key === 'ArrowLeft') step(-1);
        else if (e.key === 'ArrowRight') step(1);
      });
      document.getElementById('mainContent').appendChild(overlay);
      galleryLb = {
        el: overlay,
        open: function (idx, count) { st.idx = idx; st.count = count; show(); overlay.classList.add('open'); },
        close: close
      };
      return galleryLb;
    }

    function initSlideshow(root, count) {
      var a = root.querySelector('.pg-slide-a');
      var b = root.querySelector('.pg-slide-b');
      if (!a || !b) return;
      var prev = root.querySelector('.pg-prev');
      var next = root.querySelector('.pg-next');
      var play = root.querySelector('.pg-play');
      var label = root.querySelector('.pg-count');
      var idx = 1, front = a, back = b, playing = true;
      function render() {
        var pre = new Image();
        pre.onload = function () {
          back.src = pre.src;
          back.classList.add('show');
          front.classList.remove('show');
          var t = front; front = back; back = t;
        };
        pre.src = photoFull(idx);
        label.textContent = idx + ' / ' + count;
      }
      function go(n) { idx = ((n - 1 + count) % count) + 1; render(); }
      prev.onclick = function () { go(idx - 1); };
      next.onclick = function () { go(idx + 1); };
      function setPlay(p) { playing = p; play.innerHTML = p ? '&#10074;&#10074;' : '&#9654;'; }
      play.onclick = function () { setPlay(!playing); };
      setInterval(function () {
        var panel = root.querySelector('.pg-slideshow-panel');
        if (playing && root._mode === 'slideshow' && panel && panel.offsetParent !== null) go(idx + 1);
      }, 3800);
      go(1); setPlay(true);
    }

    function initSwipe(root, count) {
      var stack = root.querySelector('.pg-swipe-stack');
      if (!stack) return;
      var likeBtn = root.querySelector('.pg-like');
      var nopeBtn = root.querySelector('.pg-nope');
      var resetBtn = root.querySelector('.pg-reset');
      var N = count;
      var s = { swipe: 0, dragX: 0, dragging: false, startX: 0, like: {}, dislike: {} };
      var seedLike = function (i) { return 60 + ((i * 37) % 90); };
      var seedNope = function (i) { return 2 + ((i * 13) % 20); };

      var cards = [];
      for (var i = 0; i < N; i++) {
        var card = document.createElement('div');
        card.className = 'pg-card';
        card.innerHTML =
          '<img src="' + photoThumb(i + 1) + '" alt="">' +
          '<div class="pg-stamp love">Love</div>' +
          '<div class="pg-stamp nope">Nope</div>' +
          '<div class="pg-scrim"></div>' +
          '<div class="pg-counts">' +
            '<span class="pg-chip nope">&#10005; <span class="c-nope"></span></span>' +
            '<span class="pg-chip love">&#9829; <span class="c-love"></span></span>' +
          '</div>';
        stack.appendChild(card);
        cards.push(card);
      }

      function layout() {
        for (var i = 0; i < N; i++) {
          var c = cards[i], rel = i - s.swipe;
          var love = c.querySelector('.pg-stamp.love'), nope = c.querySelector('.pg-stamp.nope');
          c.querySelector('.c-love').textContent = seedLike(i) + (s.like[i] || 0);
          c.querySelector('.c-nope').textContent = seedNope(i) + (s.dislike[i] || 0);
          love.style.opacity = 0; nope.style.opacity = 0; c.style.cursor = '';
          if (rel < 0) {
            c.style.transition = 'transform .35s, opacity .35s';
            c.style.transform = 'translateX(-140%) rotate(-16deg)';
            c.style.opacity = 0; c.style.zIndex = 0; c.style.pointerEvents = 'none';
          } else if (rel === 0) {
            var dx = s.dragging ? s.dragX : 0;
            c.style.transition = s.dragging ? 'none' : 'transform .3s ease';
            c.style.transform = 'translateX(' + dx + 'px) rotate(' + (dx / 22) + 'deg)';
            c.style.opacity = 1; c.style.zIndex = 4; c.style.pointerEvents = 'auto'; c.style.cursor = 'grab';
            love.style.opacity = dx > 0 ? Math.min(dx / 90, 1) : 0;
            nope.style.opacity = dx < 0 ? Math.min(-dx / 90, 1) : 0;
          } else if (rel === 1) {
            c.style.transition = 'transform .3s'; c.style.transform = 'scale(.95) translateY(14px)';
            c.style.opacity = 1; c.style.zIndex = 3; c.style.pointerEvents = 'none';
          } else if (rel === 2) {
            c.style.transition = 'transform .3s'; c.style.transform = 'scale(.9) translateY(28px)';
            c.style.opacity = 1; c.style.zIndex = 2; c.style.pointerEvents = 'none';
          } else {
            c.style.transition = 'none'; c.style.transform = 'scale(.9) translateY(28px)';
            c.style.opacity = 0; c.style.zIndex = 1; c.style.pointerEvents = 'none';
          }
        }
      }

      function advance(dir) {
        var i = s.swipe;
        if (i >= N) return;
        if (dir > 0) s.like[i] = (s.like[i] || 0) + 1; else s.dislike[i] = (s.dislike[i] || 0) + 1;
        var c = cards[i];
        c.style.transition = 'transform .35s, opacity .35s';
        c.style.transform = 'translateX(' + (dir > 0 ? 140 : -140) + '%) rotate(' + (dir > 0 ? 16 : -16) + 'deg)';
        c.style.opacity = 0;
        s.swipe = i + 1; s.dragging = false; s.dragX = 0;
        setTimeout(layout, 30);
      }

      stack.addEventListener('pointerdown', function (e) {
        if (s.swipe >= N) return;
        s.dragging = true; s.startX = e.clientX; s.dragX = 0;
        try { stack.setPointerCapture(e.pointerId); } catch (err) {}
      });
      stack.addEventListener('pointermove', function (e) {
        if (!s.dragging) return; s.dragX = e.clientX - s.startX; layout();
      });
      function release() {
        if (!s.dragging) return;
        var dx = s.dragX;
        if (dx > 90) advance(1);
        else if (dx < -90) advance(-1);
        else { s.dragging = false; s.dragX = 0; layout(); }
      }
      stack.addEventListener('pointerup', release);
      stack.addEventListener('pointercancel', release);
      likeBtn.onclick = function () { advance(1); };
      nopeBtn.onclick = function () { advance(-1); };
      resetBtn.onclick = function () { s.swipe = 0; s.dragging = false; s.dragX = 0; s.like = {}; s.dislike = {}; layout(); };

      layout();
    }

    function initPhotoGallery() {
      var lb = ensureLightbox();
      document.querySelectorAll('.photos-root').forEach(function (root) {
        if (root._pgInit) return;
        root._pgInit = true;
        var count = parseInt(root.getAttribute('data-count'), 10) || 0;
        var isMobileShell = !!root.closest('.mobile-scroll-container');
        var tabs = root.querySelectorAll('.pg-tab');
        var panels = root.querySelectorAll('.pg-panel');

        function setMode(mode) {
          tabs.forEach(function (t) { t.classList.toggle('active', t.getAttribute('data-mode') === mode); });
          panels.forEach(function (p) { p.classList.toggle('active', p.getAttribute('data-mode') === mode); });
          root._mode = mode;
          // On mobile, swipe/slideshow go footer-less + full-height (like the mock)
          if (isMobileShell) {
            document.getElementById('mainContent')
              .classList.toggle('pg-immersive', mode === 'swipe' || mode === 'slideshow');
          }
        }
        tabs.forEach(function (t) { t.onclick = function () { setMode(t.getAttribute('data-mode')); }; });

        root.querySelectorAll('.pg-cell').forEach(function (cell) {
          cell.onclick = function () { lb.open(parseInt(cell.getAttribute('data-idx'), 10), count); };
        });

        initSlideshow(root, count);
        if (isMobileShell) initSwipe(root, count);

        setMode(isMobileShell ? 'swipe' : 'gallery');
      });
    }

    // Countdown to New Year's — Dec 31, 2026, 00:00 ET (UTC-5).
    // Updates every [data-cd] element (the hero appears in both the desktop
    // and mobile shells, so there can be two instances of each unit).
    function startCountdown() {
      const TARGET = new Date('2026-12-31T00:00:00-05:00').getTime();
      const pad = n => String(n).padStart(2, '0');
      const setAll = (unit, value) => {
        document.querySelectorAll('[data-cd="' + unit + '"]').forEach(el => {
          el.textContent = value;
        });
      };

      function updateCountdown() {
        let diff = Math.max(0, TARGET - Date.now());
        const days = Math.floor(diff / 86400000); diff -= days * 86400000;
        const hours = Math.floor(diff / 3600000); diff -= hours * 3600000;
        const mins = Math.floor(diff / 60000); diff -= mins * 60000;
        const secs = Math.floor(diff / 1000);
        setAll('days', String(days));
        setAll('hours', pad(hours));
        setAll('mins', pad(mins));
        setAll('secs', pad(secs));
      }

      // Update immediately and then every second
      updateCountdown();
      setInterval(updateCountdown, 1000);
    }

    // Split a content.json date ("Wednesday, December 30, 2026") into
    // { dow: "Wed", md: "Dec 30" } for the schedule "when" column.
    function formatWhen(dateStr) {
      if (!dateStr) return { dow: '', md: '' };
      const MONTHS = {
        January: 'Jan', February: 'Feb', March: 'Mar', April: 'Apr',
        May: 'May', June: 'Jun', July: 'Jul', August: 'Aug',
        September: 'Sep', October: 'Oct', November: 'Nov', December: 'Dec'
      };
      const m = dateStr.match(/^\s*([A-Za-z]+),\s*([A-Za-z]+)\s+(\d+)/);
      if (!m) return { dow: dateStr, md: '' };
      return {
        dow: m[1].slice(0, 3),
        md: (MONTHS[m[2]] || m[2].slice(0, 3)) + ' ' + m[3]
      };
    }
    
    // Get base path (e.g., '/wedding' for GitHub Pages or '' for root domain)
    function getBasePath() {
      const path = window.location.pathname;
      const parts = path.split('/').filter(p => p);
      // If first part is 'wedding' (repo name), use it as base
      if (parts.length > 0 && parts[0] === 'wedding') {
        return '/wedding';
      }
      return '';
    }
    
    function toggleMobileMenu() {
      const menu = document.getElementById('mobileMenu');
      const hamburger = document.querySelector('.hamburger');
      menu.classList.toggle('active');
      hamburger.classList.toggle('active');
    }
    
    // Force-restart registry animations to fix iOS sync issue
    function restartRegistryAnimations() {
      const ring = document.querySelector('.registry-icons-ring');
      const wrappers = document.querySelectorAll('.registry-icon-wrapper');
      if (ring) {
        // Briefly remove animation, force reflow, then restore
        ring.style.animation = 'none';
        wrappers.forEach(w => w.style.animation = 'none');
        void ring.offsetWidth; // Force reflow
        ring.style.animation = '';
        wrappers.forEach(w => w.style.animation = '');
      }
    }
    
    function toggleQA(element) {
      const qaItem = element.parentElement;
      qaItem.classList.toggle('active');
    }
    
    // Bouncing question mark screensaver
    let bouncerX = 100, bouncerY = 100;
    let bouncerDX = 1.2, bouncerDY = 0.9;
    let bouncerAnimationId = null;
    
    function animateBouncer() {
      const bouncer = document.getElementById('qaBouncer');
      
      if (!bouncer) {
        bouncerAnimationId = requestAnimationFrame(animateBouncer);
        return;
      }
      
      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;
      const bouncerWidth = 60;
      const bouncerHeight = 60;
      
      bouncerX += bouncerDX;
      bouncerY += bouncerDY;
      
      // Bounce off edges - use screen dimensions
      if (bouncerX <= 0) {
        bouncerDX = Math.abs(bouncerDX);
        bouncerX = 0;
      } else if (bouncerX + bouncerWidth >= screenWidth) {
        bouncerDX = -Math.abs(bouncerDX);
        bouncerX = screenWidth - bouncerWidth;
      }
      
      if (bouncerY <= 0) {
        bouncerDY = Math.abs(bouncerDY);
        bouncerY = 0;
      } else if (bouncerY + bouncerHeight >= screenHeight) {
        bouncerDY = -Math.abs(bouncerDY);
        bouncerY = screenHeight - bouncerHeight;
      }
      
      bouncer.style.left = bouncerX + 'px';
      bouncer.style.top = bouncerY + 'px';
      
      bouncerAnimationId = requestAnimationFrame(animateBouncer);
    }
    
    // Start bouncer when Q+A section is shown
    function startBouncer() {
      if (!bouncerAnimationId) {
        // Reset position to center-ish
        bouncerX = window.innerWidth / 3;
        bouncerY = window.innerHeight / 3;
        bouncerAnimationId = requestAnimationFrame(animateBouncer);
      }
    }
    
    function stopBouncer() {
      if (bouncerAnimationId) {
        cancelAnimationFrame(bouncerAnimationId);
        bouncerAnimationId = null;
      }
    }
    
    function showSection(sectionId) {
      // Section title mapping
      const titles = {
        'home': 'we’re getting married',
        'photos': 'Photos',
        'qa': 'Frequently Asked',
        'travel': 'Hotels & Travel',
        'things': 'Things to Do',
        'rsvp': 'RSVP',
        'registry': 'Our Registry'
      };
      
      // Hide all sections
      document.querySelectorAll('.page-section').forEach(section => {
        section.classList.remove('active');
      });
      
      // Show selected section in both desktop and mobile containers
      document.querySelectorAll('#section-' + sectionId).forEach(section => {
        section.classList.add('active');
      });
      
      // Update nav active state (both desktop and mobile)
      document.querySelectorAll('.site-nav a, .mobile-menu nav a').forEach(link => {
        link.classList.remove('active');
      });
      
      // Add active to links that match the current section
      const sectionPath = sectionId === 'home' ? '/' : '/' + sectionId;
      document.querySelectorAll('.site-nav a, .mobile-menu nav a').forEach(link => {
        const href = link.getAttribute('href');
        if ((href === '/' && sectionId === 'home') || href === sectionPath) {
          link.classList.add('active');
        }
      });
      
      // Update mobile top bar title
      const mobileTitle = document.getElementById('mobilePageTitle');
      if (mobileTitle && titles[sectionId]) {
        mobileTitle.textContent = titles[sectionId];
      }
      
      // Toggle page-specific classes for mobile header hiding
      const mainContent = document.getElementById('mainContent');
      if (mainContent) {
        // Photos page
        if (sectionId === 'photos') {
          mainContent.classList.add('photos-page-active');
        } else {
          mainContent.classList.remove('photos-page-active');
        }
        // Registry page
        if (sectionId === 'registry') {
          mainContent.classList.add('registry-page-active');
          // Force-restart animations to fix iOS sync issue
          restartRegistryAnimations();
        } else {
          mainContent.classList.remove('registry-page-active');
        }
        // Q+A page
        if (sectionId === 'qa') {
          mainContent.classList.add('qa-page-active');
          startBouncer();
        } else {
          mainContent.classList.remove('qa-page-active');
          stopBouncer();
        }
        // Travel page
        if (sectionId === 'travel') {
          mainContent.classList.add('travel-page-active');
        } else {
          mainContent.classList.remove('travel-page-active');
        }
        // Home page (controls the mobile top-bar brand mark)
        if (sectionId === 'home') {
          mainContent.classList.add('home-page-active');
        } else {
          mainContent.classList.remove('home-page-active');
        }
      }
      
      // Update URL without page reload (preserve base path)
      const basePath = getBasePath();
      const path = sectionId === 'home' ? basePath + '/' : basePath + '/' + sectionId;
      window.history.pushState({ section: sectionId }, '', path);
      
      // Close mobile menu if open
      const menu = document.getElementById('mobileMenu');
      const hamburger = document.querySelector('.hamburger');
      if (menu) menu.classList.remove('active');
      if (hamburger) hamburger.classList.remove('active');
      
      return false;
    }
    
    // Handle browser back/forward buttons
    window.addEventListener('popstate', function(e) {
      if (e.state && e.state.section) {
        showSectionFromUrl(e.state.section);
      } else {
        // Default to home if no state
        showSectionFromUrl('home');
      }
    });
    
    // Helper function to show section without modifying history
    function showSectionFromUrl(sectionId) {
      const titles = {
        'home': 'we’re getting married',
        'photos': 'Photos',
        'qa': 'Frequently Asked',
        'travel': 'Hotels & Travel',
        'things': 'Things to Do',
        'rsvp': 'RSVP',
        'registry': 'Our Registry'
      };
      
      document.querySelectorAll('.page-section').forEach(section => {
        section.classList.remove('active');
      });
      
      document.querySelectorAll('#section-' + sectionId).forEach(section => {
        section.classList.add('active');
      });
      
      // Update nav active state (both desktop and mobile)
      document.querySelectorAll('.site-nav a, .mobile-menu nav a').forEach(link => {
        link.classList.remove('active');
      });
      
      // Add active to links that match the current section
      const sectionPath = sectionId === 'home' ? '/' : '/' + sectionId;
      document.querySelectorAll('.site-nav a, .mobile-menu nav a').forEach(link => {
        const href = link.getAttribute('href');
        if ((href === '/' && sectionId === 'home') || href === sectionPath) {
          link.classList.add('active');
        }
      });
      
      const mobileTitle = document.getElementById('mobilePageTitle');
      if (mobileTitle && titles[sectionId]) {
        mobileTitle.textContent = titles[sectionId];
      }
      
      // Toggle page-specific classes for mobile header hiding
      const mainContent = document.getElementById('mainContent');
      if (mainContent) {
        // Photos page
        if (sectionId === 'photos') {
          mainContent.classList.add('photos-page-active');
        } else {
          mainContent.classList.remove('photos-page-active');
        }
        // Registry page
        if (sectionId === 'registry') {
          mainContent.classList.add('registry-page-active');
          // Force-restart animations to fix iOS sync issue
          restartRegistryAnimations();
        } else {
          mainContent.classList.remove('registry-page-active');
        }
        // Q+A page
        if (sectionId === 'qa') {
          mainContent.classList.add('qa-page-active');
          startBouncer();
        } else {
          mainContent.classList.remove('qa-page-active');
          stopBouncer();
        }
        // Travel page
        if (sectionId === 'travel') {
          mainContent.classList.add('travel-page-active');
        } else {
          mainContent.classList.remove('travel-page-active');
        }
        // Home page (controls the mobile top-bar brand mark)
        if (sectionId === 'home') {
          mainContent.classList.add('home-page-active');
        } else {
          mainContent.classList.remove('home-page-active');
        }
      }
    }
    
  </script>
