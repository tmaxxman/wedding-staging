<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Meghan & Nolan</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪩</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600&family=Sacramento&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Georgia', serif;
      background: #000; /* Black to match video during password phase */
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow: hidden;
    }
    
    
    /* Video background - fixed overlay that fades out */
    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
      overflow: hidden;
      opacity: 1;
      /* ease-in: slow start, fast end */
      transition: opacity 1.5s ease-in;
      pointer-events: none;
    }
    
    .video-background video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      pointer-events: none;
    }
    
    /* Dark overlay removed for brighter video */
    .video-background::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0);
      pointer-events: none;
    }
    
    /* Fallback gradient if video doesn't load */
    body.no-video {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    /* Fade out video when content is visible */
    body.content-visible .video-background {
      opacity: 0;
      pointer-events: none;
    }
    
    .container {
      /* Container just holds password page and main content */
    }
    
    .password-page {
      position: fixed;
      top: calc(58vh - 50px); /* Same position as before */
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 200;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      transition: opacity 0.5s ease-out;
    }
    
    .password-page.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    
    .password-page h1 {
      color: #fff;
      margin-bottom: 20px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }
    
    .password-page p {
      color: #fff;
      margin-bottom: 30px;
      font-size: 1.1em;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
    }
    
    .password-input {
      width: 100%;
      max-width: 300px;
      padding: 15px 20px;
      font-size: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      border: 1px solid rgba(200, 200, 200, 0.9);
      border-radius: 10px;
      transition: border-color 0.3s, color 0.3s;
      margin: 0;
      height: 50px;
      background: transparent;
      color: rgba(180, 180, 180, 0.95);
      text-align: center;
    }
    
    .password-input::placeholder {
      color: rgba(200, 200, 200, 0.85);
      font-style: italic;
      text-align: center;
    }
    
    .password-input:focus {
      outline: none;
      border-color: rgba(68, 68, 68, 0.8);
    }
    
    .password-input-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
      position: relative;
    }
    
    /* Ensure input stays visible on mobile when keyboard opens */
    .password-input.granted {
      color: #4ade80;
      border-color: #4ade80;
    }
    
    .btn {
      background: rgba(68, 68, 68, 0.7);
      color: white;
      border: none;
      padding: 0;
      font-size: 24px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      font-weight: bold;
      width: 50px;
      height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      line-height: 1;
      backdrop-filter: blur(10px);
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(68, 68, 68, 0.4);
      background: rgba(68, 68, 68, 0.85);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .error-message {
      color: #ff6b6b;
      margin-top: 15px;
      font-size: 14px;
      min-height: 20px;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
      font-weight: 500;
    }
    
    /* ========== MAIN CONTENT STYLES ========== */
    /* Main content sits behind video/password, already in position */
    .main-content {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #faf9f7;
      font-family: 'Raleway', sans-serif;
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 50;
    }
    
    /* When shown - just display it, no animation */
    .main-content.shown {
      display: block;
    }
    
    /* Mobile: flex container for title bar + scroll area */
    @media (max-width: 768px) {
      .main-content.shown {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
    }
    
    /* Site Header */
    .site-header {
      text-align: center;
      padding: 40px 20px 20px;
      background: #faf9f7;
    }
    
    .site-title {
      font-family: 'Bodoni Moda', serif;
      font-size: 4em;
      font-weight: 400;
      color: #1a1a1a;
      letter-spacing: 2px;
      margin-bottom: 15px;
    }
    
    .site-title .ampersand {
      font-style: normal;
    }
    
    .site-date {
      font-family: 'Raleway', sans-serif;
      font-size: 1.1em;
      font-weight: 400;
      color: #333;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    
    .site-date-mobile {
      display: none;
    }
    
    @media (max-width: 768px) {
      .site-date {
        display: none;
      }
      
      .site-date-mobile {
        display: block;
        font-family: 'Raleway', sans-serif;
        font-size: 1em;
        font-weight: 400;
        color: #333;
        letter-spacing: 2px;
        text-transform: uppercase;
        text-align: center;
      }
      
      .site-date-mobile .date-line,
      .site-date-mobile .location-line {
        display: block;
      }
      
      .site-date-mobile .date-divider {
        display: block;
        width: 40px;
        height: 2px;
        background: #f3722b;
        margin: 12px auto;
      }
    }
    
    /* Hide mobile elements on desktop */
    .mobile-top-bar,
    .mobile-menu,
    .mobile-scroll-container {
      display: none;
    }
    
    /* Desktop Navigation */
    .site-nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 20px;
      background: #faf9f7;
    }
    
    .site-nav a {
      font-family: 'Raleway', sans-serif;
      font-size: 0.95em;
      font-weight: 400;
      color: #333;
      text-decoration: none;
      letter-spacing: 1px;
      padding: 5px 0;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s;
    }
    
    .site-nav a:hover,
    .site-nav a.active {
      border-bottom: 2px solid #f3722b;
    }
    
    .site-nav a.active {
      font-weight: 600;
    }
    
    /* Mobile top bar - flex item with fixed size */
    .mobile-top-bar {
      display: none;
      width: 100%;
      height: 60px;
      min-height: 60px;
      max-height: 60px; /* Prevent growing */
      flex-shrink: 0; /* Prevent shrinking */
      flex-grow: 0; /* Prevent growing */
      background: #faf9f7;
      z-index: 1001;
      border-bottom: 1px solid #eee;
      touch-action: manipulation;
      position: relative;
    }
    
    /* Mobile countdown bar */
    .mobile-countdown {
      display: none;
      width: 100%;
      padding: 5px 20px;
      background: #faf9f7;
      border-bottom: 1px solid #eee;
      align-items: center;
      justify-content: space-around;
      font-family: 'Raleway', sans-serif;
      font-size: 0.9em;
      color: #333;
    }
    
    .countdown-label-left {
      font-family: 'Bodoni Moda', serif;
      font-size: 1.5em;
      font-weight: 400;
      letter-spacing: 1px;
      color: #333;
    }
    
    .countdown-timer {
      display: flex;
      gap: 12px;
    }
    
    .countdown-unit {
      text-align: center;
    }
    
    .countdown-number {
      font-family: 'Bodoni Moda', serif;
      font-size: 1.4em;
      font-weight: 600;
      color: #f3722b;
      display: block;
      font-variant-numeric: tabular-nums;
    }
    
    .countdown-label {
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
    }
    
    /* Mobile hero photo */
    .mobile-hero-photo {
      display: none;
      width: 100%;
      overflow: hidden;
    }
    
    .mobile-hero-photo img {
      width: 100%;
      height: auto;
      display: block;
      filter: brightness(1.1);
    }
    
    .mobile-top-bar-title {
      position: absolute;
      top: 58%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Sacramento', cursive;
      font-size: 2em;
      font-weight: 400;
      letter-spacing: 1px;
      color: #333;
      white-space: nowrap;
    }
    
    /* Desktop scroll container - full page scrollable */
    .desktop-scroll-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow-y: auto;
      overflow-x: hidden;
      background: #faf9f7;
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE/Edge */
    }
    
    .desktop-scroll-container::-webkit-scrollbar {
      display: none; /* Chrome/Safari/Opera */
    }
    
    /* Mobile scroll container */
    .mobile-scroll-container {
      display: none;
      background: #faf9f7;
    }
    
    /* Mobile hamburger button */
    .hamburger {
      display: none;
      position: absolute;
      top: 50%;
      left: 15px;
      transform: translateY(-50%);
      z-index: 1002;
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    
    /* Large clickable area for hamburger menu */
    .hamburger-click-area {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 25%;
      height: 100%;
      z-index: 1001;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    
    .hamburger span {
      display: block;
      width: 25px;
      height: 2px;
      background: #333;
      margin: 5px 0;
      transition: all 0.3s;
    }
    
    .hamburger.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }
    
    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }
    
    .hamburger.active span:nth-child(3) {
      transform: rotate(-45deg) translate(5px, -5px);
    }
    
    /* Mobile menu overlay */
    .mobile-menu {
      display: none;
      position: fixed;
      top: 60px;
      left: 0;
      width: 100%;
      height: calc(100% - 60px);
      background: #faf9f7;
      z-index: 1000;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }
    
    .mobile-menu.active {
      opacity: 1;
      visibility: visible;
    }
    
    /* Icon scroller in mobile menu */
    .menu-icon-scroller {
      position: absolute;
      bottom: 5vh;
      left: 0;
      width: 100%;
      overflow: hidden;
      padding: 20px 0;
    }
    
    .menu-icon-scroller-top {
      position: absolute;
      top: 4vh;
      left: 0;
      width: 100%;
      overflow: hidden;
      padding: 20px 0;
    }
    
    .icon-track {
      display: flex;
      animation: scroll-icons 20s linear infinite;
      width: fit-content;
    }
    
    .icon-track-reverse {
      display: flex;
      animation: scroll-icons-reverse 20s linear infinite;
      width: fit-content;
    }
    
    .icon-track img,
    .icon-track-reverse img {
      height: 40px;
      width: 40px;
      margin: 0 25px;
      display: inline-block;
      filter: brightness(0) saturate(100%) invert(48%) sepia(85%) saturate(1703%) hue-rotate(347deg) brightness(98%) contrast(93%);
    }
    
    /* Desktop vertical icon scrollers */
    .desktop-icon-scroller {
      position: fixed;
      top: 0;
      width: 50px;
      height: 100vh;
      overflow: hidden;
      z-index: 10;
      pointer-events: none;
    }
    
    .desktop-icon-scroller.left {
      left: 25px;
    }
    
    .desktop-icon-scroller.right {
      right: 25px;
    }
    
    .desktop-icon-track {
      display: flex;
      flex-direction: column;
      animation: scroll-icons-vertical 15s linear infinite;
    }
    
    .desktop-icon-track-reverse {
      display: flex;
      flex-direction: column;
      animation: scroll-icons-vertical-reverse 15s linear infinite;
    }
    
    .desktop-icon-track img,
    .desktop-icon-track-reverse img {
      width: 36px;
      height: 36px;
      margin: 20px auto;
      display: block;
      filter: brightness(0) saturate(100%) invert(48%) sepia(85%) saturate(1703%) hue-rotate(347deg) brightness(98%) contrast(93%);
      opacity: 0.7;
    }
    
    @keyframes scroll-icons-vertical {
      0% {
        transform: translateY(0);
      }
      100% {
        transform: translateY(-50%);
      }
    }
    
    @keyframes scroll-icons-vertical-reverse {
      0% {
        transform: translateY(-50%);
      }
      100% {
        transform: translateY(0);
      }
    }
    
    /* Hide desktop scrollers on mobile */
    @media (max-width: 768px) {
      .desktop-icon-scroller {
        display: none;
      }
    }
    
    /* Hide on narrower desktops where they'd overlap content */
    @media (max-width: 1000px) {
      .desktop-icon-scroller {
        display: none;
      }
    }
    
    @keyframes scroll-icons-reverse {
      0% {
        transform: translateX(-50%);
      }
      100% {
        transform: translateX(0);
      }
    }
    
    @keyframes scroll-icons {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-50%);
      }
    }
    
    .mobile-menu-header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .mobile-menu-title {
      font-family: 'Raleway', sans-serif;
      font-size: 0.9em;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #333;
      margin-bottom: 30px;
    }
    
    .mobile-menu-couple {
      font-family: 'Bodoni Moda', serif;
      font-size: 2.5em;
      font-weight: 400;
      color: #1a1a1a;
      line-height: 1.3;
    }
    
    .mobile-menu-couple .ampersand {
      font-style: normal;
    }
    
    .mobile-menu-date {
      font-family: 'Raleway', sans-serif;
      font-size: 0.85em;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #333;
      margin-top: 15px;
    }
    
    .mobile-menu nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
      position: relative;
      padding: 80px 0;
    }
    
    .mobile-menu nav a {
      font-family: 'Raleway', sans-serif;
      font-size: 1.1em;
      font-weight: 400;
      color: #333;
      text-decoration: none;
      letter-spacing: 1px;
    }
    
    .mobile-menu nav a.active {
      border-bottom: 2px solid #f3722b;
      padding-bottom: 2px;
      font-weight: 600;
    }
    
    /* Page sections */
    .page-section {
      display: none;
      padding: 0 20px 60px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .page-section.active {
      display: block;
    }
    
    /* Mobile: sections container and page sections fill available height */
    @media (max-width: 768px) {
      .mobile-sections {
        height: 100%;
        min-height: 100%;
        display: flex;
        flex-direction: column;
      }
      
      .mobile-scroll-container .page-section {
        height: 100%;
      }
      
      .mobile-scroll-container .page-section.active {
        height: 100%;
        flex: 1;
      }
    }
    
    .page-section h2 {
      font-family: 'Bodoni Moda', serif;
      font-size: 2.5em;
      font-weight: 400;
      color: #1a1a1a;
      text-align: center;
      margin-bottom: 40px;
    }
    
    .page-section p {
      font-family: 'Raleway', sans-serif;
      font-size: 1.1em;
      line-height: 1.8;
      color: #444;
      max-width: 800px;
      margin: 0 auto 20px;
    }
    
    /* Events list styling */
    .events-list {
      max-width: 750px;
      margin: 0 auto;
      padding-bottom: 60px;
    }
    
    .home-hero-image {
      max-width: 750px;
      width: 100%;
      max-height: 420px;
      margin: 0 auto 20px;
      display: block;
      border-radius: 8px;
      object-fit: cover;
      object-position: center bottom;
      filter: brightness(1.1);
    }
    
    .event-item {
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 40px;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .event-title {
      font-family: 'Bodoni Moda', serif;
      font-size: 2em;
      font-weight: 600;
      letter-spacing: 2px;
      color: #1a1a1a;
      margin-bottom: 15px;
      text-transform: uppercase;
    }
    
    .event-date {
      font-family: 'Raleway', sans-serif;
      font-size: 1.1em;
      color: #555;
      margin-bottom: 8px;
    }
    
    .event-time {
      font-family: 'Raleway', sans-serif;
      font-size: 1.3em;
      color: #333;
      margin-bottom: 20px;
      font-weight: 500;
    }
    
    .event-after-party {
      font-family: 'Raleway', sans-serif;
      font-size: 1em;
      color: #555;
      margin-top: 15px;
      margin-bottom: 5px;
    }
    
    .event-after-party-time {
      font-family: 'Raleway', sans-serif;
      font-size: 1.3em;
      color: #333;
      margin-bottom: 20px;
      font-weight: 500;
    }
    
    .event-venue {
      font-family: 'Raleway', sans-serif;
      font-size: 1em;
      color: #444;
      margin-bottom: 5px;
    }
    
    .event-location {
      font-family: 'Raleway', sans-serif;
      font-size: 0.95em;
      color: #666;
      margin-bottom: 20px;
    }
    
    .event-venue-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    
    .map-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #f3722b;
      transition: transform 0.2s, color 0.2s;
      margin-bottom: 5px;
    }
    
    .map-link:hover {
      transform: scale(1.15);
      color: #d45d1a;
    }
    
    .map-link svg {
      width: 18px;
      height: 18px;
      display: block;
    }
    
    .event-attire-label {
      font-family: 'Raleway', sans-serif;
      font-size: 0.9em;
      color: #666;
      margin-bottom: 5px;
    }
    
    .event-attire {
      font-family: 'Raleway', sans-serif;
      font-size: 1em;
      color: #333;
    }
    
    /* Photo grid */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 40px;
    }
    
    .photo-grid img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }
    
    /* Photos Coming Soon styles */
    .photos-coming-soon {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      padding: 20px;
    }
    
    .photos-coming-soon-wrapper {
      position: relative;
      display: inline-block;
      max-width: 100%;
    }
    
    .photos-coming-soon-wrapper img {
      display: block;
      max-width: 100%;
      max-height: 70vh;
      width: auto;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
    }
    
    .coming-soon-banner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-5deg);
      background: white;
      padding: 15px 40px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      white-space: nowrap;
      border-radius: 10px;
    }
    
    .coming-soon-banner span {
      font-family: 'Sacramento', cursive;
      font-size: 3em;
      color: #f3722b;
      display: block;
      text-align: center;
    }
    
    /* Mobile: Photos page fills available space */
    @media (max-width: 768px) {
      .photos-page-active .mobile-scroll-container .site-header {
        display: none;
      }
      
      .photos-page-active .mobile-scroll-container {
        display: flex !important;
        flex-direction: column;
        height: 100%;
      }
      
      .photos-page-active #section-photos {
        flex: 1;
        display: flex !important;
        min-height: 0;
      }
      
      .photos-page-active .photos-coming-soon {
        flex: 1;
        width: 100%;
        min-height: 0;
        padding: 15px;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
      }

        );
        
        const key = await crypto.subtle.importKey(
          'raw',
          derivedBits,
          'AES-GCM',
          false,
          ['decrypt']
        );
        
        // Combine content and auth tag for GCM
        const combined = new Uint8Array(contentBytes.length + authTagBytes.length);
        combined.set(contentBytes);
        combined.set(authTagBytes, contentBytes.length);
        
        // Decrypt
        const decrypted = await crypto.subtle.decrypt(
          {
            name: 'AES-GCM',
            iv: ivBytes,
            tagLength: 128
          },
          key,
          combined
        );
        
        const dec = new TextDecoder();
        return dec.decode(decrypted);
      } catch (error) {
        return null;
      }
    }
    
    function hexToBytes(hex) {
      const bytes = new Uint8Array(hex.length / 2);
      for (let i = 0; i < hex.length; i += 2) {
        bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
      }
      return bytes;
    }
    
    // Debounce timer for auto-checking password as user types
    let passwordCheckTimer = null;
    
    async function checkPasswordAsYouType() {
      const errorMsg = document.getElementById('errorMessage');
      errorMsg.textContent = ''; // Clear error message while typing
      
      // Clear previous timer
      if (passwordCheckTimer) {
        clearTimeout(passwordCheckTimer);
      }
      
      // Wait 300ms after user stops typing before checking
      passwordCheckTimer = setTimeout(async () => {
        await checkPassword();
      }, 300);
    }
    
    async function checkPassword() {
      const passwordInput = document.getElementById('passwordInput');
      const password = passwordInput.value.toLowerCase();
      const errorMsg = document.getElementById('errorMessage');
      
      // Don't check if input is disabled (already granted access)
      if (passwordInput.disabled) {
        return;
      }
      
      if (!password) {
        return;
      }
      
      const decryptedContent = await decryptContent(password, ENCRYPTED_DATA);
      
      if (decryptedContent) {
        // Success! Show "Welcome!" in green
        const passwordInput = document.getElementById('passwordInput');
        passwordInput.type = 'text';
        passwordInput.value = 'Welcome!';
        passwordInput.classList.add('granted');
        passwordInput.disabled = true;
        
        // Close keyboard and scroll back to top first
        passwordInput.blur();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        // Wait for keyboard to close and scroll to complete, then fade
        setTimeout(async () => {
          try {
            const data = JSON.parse(decryptedContent);
            displayContent(data);
            
            // Load correct section based on current URL or redirect from 404
            let path = sessionStorage.getItem('redirect');
            if (path) {
              sessionStorage.removeItem('redirect');
            } else {
              path = window.location.pathname;
            }
            // Extract section ID from path (handle both /photos and /wedding/photos)
            const pathParts = path.split('/').filter(p => p);
            // Filter out 'wedding' base path if present
            const filteredParts = pathParts.filter(p => p !== 'wedding');
            const sectionId = filteredParts.length === 0 ? 'home' : filteredParts[filteredParts.length - 1];
            // Always show the appropriate section (including home)
            if (sectionId !== 'home') {
              showSectionFromUrl(sectionId);
            }
            // Home section is already active by default in the HTML
            
            // Show main content immediately (it's behind video, will be revealed as video fades)
            const mainContent = document.getElementById('mainContent');
            mainContent.classList.add('shown');
            
            // Fade out password box
            document.getElementById('passwordPage').classList.add('hidden');
            
            // Fade out video (content is already visible behind it)
            document.body.classList.add('content-visible');
            
            // Forward touch events from video to scroll container during fade
            const videoBackground = document.querySelector('.video-background');
            const scrollContainer = document.querySelector('.mobile-scroll-container');
            if (videoBackground && scrollContainer) {
              // Allow touch events to reach content by making video non-interactive
              videoBackground.style.pointerEvents = 'none';
              
              // For iOS: also forward touch events manually
              const forwardTouch = (e) => {
                const touch = e.touches[0];
                const target = document.elementFromPoint(touch.clientX, touch.clientY);
                if (target && target !== videoBackground) {
                  // Event will naturally go to the element below since pointer-events: none
                }
              };
              videoBackground.addEventListener('touchstart', forwardTouch, { passive: true });
              videoBackground.addEventListener('touchmove', forwardTouch, { passive: true });
            }
            
            // Remove video from DOM at 1.5s (ease-in means it's mostly faded by then)
            setTimeout(() => {
              if (videoBackground) {
                videoBackground.remove();
              }
            }, 1500);
            
            // Store success in session (not password)
            sessionStorage.setItem('authenticated', 'true');
          } catch (error) {
            console.error('Error loading content:', error);
            errorMsg.textContent = 'Error loading content: ' + error.message;
          }
        }, 800);
      } else {
        // Only show error if password seems substantial (likely complete)
        // But don't show error if input is already disabled (access granted)
        if (password.length >= 8 && !passwordInput.disabled) {
          errorMsg.textContent = 'Incorrect password';
          // Clear after showing error briefly
          setTimeout(() => {
            document.getElementById('passwordInput').value = '';
            errorMsg.textContent = '';
            document.getElementById('passwordInput').focus();
          }, 1500);
        }
      }
    }

              <img src="icons/champagne-glasses.svg" alt="champagne">
              <img src="icons/wedding-cake.svg" alt="cake">
              <img src="icons/bride-groom.svg" alt="bride and groom">
              <img src="icons/disco-ball.svg" alt="disco">
              <img src="icons/dance.svg" alt="dance">
              <img src="icons/dj.svg" alt="dj">
              <img src="icons/champagne-bottle.svg" alt="bottle">
            </div>
          </div>
        </div>
        
        <div class="mobile-scroll-container">
          <!-- MOBILE: Countdown timer (only on home page) -->
          <div class="mobile-countdown">
            <span class="countdown-label-left">NYE 2026:</span>
            <div class="countdown-timer">
              <div class="countdown-unit">
                <span class="countdown-number" id="days">000</span>
                <span class="countdown-label">Days</span>
              </div>
              <div class="countdown-unit">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">Hours</span>
              </div>
              <div class="countdown-unit">
                <span class="countdown-number" id="minutes">00</span>
                <span class="countdown-label">Min</span>
              </div>
              <div class="countdown-unit">
                <span class="countdown-number" id="seconds">00</span>
                <span class="countdown-label">Sec</span>
              </div>
            </div>
          </div>
          <!-- MOBILE: Hero photo (only on home page) -->
          <div class="mobile-hero-photo">
            <img src="orange_trees.jpg" alt="Orange Trees">
          </div>
          <header class="site-header">
            <h1 class="site-title">MEGHAN <span class="ampersand">&</span> NOLAN</h1>
            <div class="site-date-mobile">
              <span class="date-line">December 31, 2026</span>
              <span class="date-divider"></span>
              <span class="location-line">Boston, Massachusetts</span>
            </div>
          </header>
          <div class="mobile-sections">
            ${sectionsHTML}
          </div>
        </div>
      `;
      
      // Start countdown timer
      startCountdown();
    }
    
    // Countdown timer to December 31, 2026 at midnight ET
    function startCountdown() {
      function updateCountdown() {
        // Target date: December 31, 2026, 00:00:00 ET (UTC-5)
        const targetDate = new Date('2026-12-31T00:00:00-05:00');
        const now = new Date();
        const diff = targetDate - now;
        
        if (diff <= 0) {
          // Event has passed
          document.getElementById('days').textContent = '000';
          document.getElementById('hours').textContent = '00';
          document.getElementById('minutes').textContent = '00';
          document.getElementById('seconds').textContent = '00';
          return;
        }
        
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);
        
        document.getElementById('days').textContent = String(days).padStart(3, '0');
        document.getElementById('hours').textContent = String(hours).padStart(2, '0');
        document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
        document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
      }
      
      // Update immediately and then every second
      updateCountdown();
      setInterval(updateCountdown, 1000);
    }
    
    // Get base path (e.g., '/wedding' for GitHub Pages or '' for root domain)
    function getBasePath() {
      const path = window.location.pathname;
      const parts = path.split('/').filter(p => p);
      // If first part is 'wedding' (repo name), use it as base
      if (parts.length > 0 && parts[0] === 'wedding') {
        return '/wedding';
      }
      return '';
    }
    
    function toggleMobileMenu() {
      const menu = document.getElementById('mobileMenu');
      const hamburger = document.querySelector('.hamburger');
      menu.classList.toggle('active');
      hamburger.classList.toggle('active');
    }
    
    // Force-restart registry animations to fix iOS sync issue
    function restartRegistryAnimations() {
      const ring = document.querySelector('.registry-icons-ring');
      const wrappers = document.querySelectorAll('.registry-icon-wrapper');
      if (ring) {
        // Briefly remove animation, force reflow, then restore
        ring.style.animation = 'none';
        wrappers.forEach(w => w.style.animation = 'none');
        void ring.offsetWidth; // Force reflow
        ring.style.animation = '';
        wrappers.forEach(w => w.style.animation = '');
      }
    }
    
    function toggleQA(element) {
      const qaItem = element.parentElement;
      qaItem.classList.toggle('active');
    }
    
    // Bouncing question mark screensaver
    let bouncerX = 100, bouncerY = 100;
    let bouncerDX = 1.2, bouncerDY = 0.9;
    let bouncerAnimationId = null;
    
    function animateBouncer() {
      const bouncer = document.getElementById('qaBouncer');
      
      if (!bouncer) {
        bouncerAnimationId = requestAnimationFrame(animateBouncer);
        return;
      }
      
      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;
      const bouncerWidth = 60;
      const bouncerHeight = 60;
      
      bouncerX += bouncerDX;
      bouncerY += bouncerDY;
      
      // Bounce off edges - use screen dimensions
      if (bouncerX <= 0) {
        bouncerDX = Math.abs(bouncerDX);
        bouncerX = 0;
      } else if (bouncerX + bouncerWidth >= screenWidth) {
        bouncerDX = -Math.abs(bouncerDX);
        bouncerX = screenWidth - bouncerWidth;
      }
      
      if (bouncerY <= 0) {
        bouncerDY = Math.abs(bouncerDY);
        bouncerY = 0;
      } else if (bouncerY + bouncerHeight >= screenHeight) {
        bouncerDY = -Math.abs(bouncerDY);
        bouncerY = screenHeight - bouncerHeight;
      }
      
      bouncer.style.left = bouncerX + 'px';
      bouncer.style.top = bouncerY + 'px';
      
      bouncerAnimationId = requestAnimationFrame(animateBouncer);
    }
    
    // Start bouncer when Q+A section is shown
    function startBouncer() {
      if (!bouncerAnimationId) {
        // Reset position to center-ish
        bouncerX = window.innerWidth / 3;
        bouncerY = window.innerHeight / 3;
        bouncerAnimationId = requestAnimationFrame(animateBouncer);
      }
    }
    
    function stopBouncer() {
      if (bouncerAnimationId) {
        cancelAnimationFrame(bouncerAnimationId);
        bouncerAnimationId = null;
      }
    }
    
    function showSection(sectionId) {
      // Section title mapping
      const titles = {
        'home': 'M & N',
        'photos': 'Photos',
        'qa': 'Q + A',
        'travel': 'Hotels & Travel',
        'things': 'Things to Do',
        'rsvp': 'RSVP',
        'registry': 'Our Registry'
      };
      
      // Hide all sections
      document.querySelectorAll('.page-section').forEach(section => {
        section.classList.remove('active');
      });
      
      // Show selected section in both desktop and mobile containers
      document.querySelectorAll('#section-' + sectionId).forEach(section => {
        section.classList.add('active');
      });
      
      // Update nav active state (both desktop and mobile)
      document.querySelectorAll('.site-nav a, .mobile-menu nav a').forEach(link => {
        link.classList.remove('active');
      });
      
      // Add active to links that match the current section
      const sectionPath = sectionId === 'home' ? '/' : '/' + sectionId;
      document.querySelectorAll('.site-nav a, .mobile-menu nav a').forEach(link => {
        const href = link.getAttribute('href');
        if ((href === '/' && sectionId === 'home') || href === sectionPath) {
          link.classList.add('active');
        }
      });
      
      // Update mobile top bar title
      const mobileTitle = document.getElementById('mobilePageTitle');
      if (mobileTitle && titles[sectionId]) {
        mobileTitle.textContent = titles[sectionId];
      }
      
      // Show/hide countdown and hero photo on mobile (only on home page)
      const countdown = document.querySelector('.mobile-countdown');
      const heroPhoto = document.querySelector('.mobile-hero-photo');
      if (countdown) {
        countdown.style.display = sectionId === 'home' ? 'flex' : 'none';
      }
      if (heroPhoto) {
        heroPhoto.style.display = sectionId === 'home' ? 'block' : 'none';
      }
      
      // Toggle page-specific classes for mobile header hiding
      const mainContent = document.getElementById('mainContent');
      if (mainContent) {
        // Photos page
        if (sectionId === 'photos') {
          mainContent.classList.add('photos-page-active');
        } else {
          mainContent.classList.remove('photos-page-active');
        }
        // Registry page
        if (sectionId === 'registry') {
          mainContent.classList.add('registry-page-active');
          // Force-restart animations to fix iOS sync issue
          restartRegistryAnimations();
        } else {
          mainContent.classList.remove('registry-page-active');
        }
        // Q+A page
        if (sectionId === 'qa') {
          mainContent.classList.add('qa-page-active');
          startBouncer();
        } else {
          mainContent.classList.remove('qa-page-active');
          stopBouncer();
        }
        // Travel page
        if (sectionId === 'travel') {
          mainContent.classList.add('travel-page-active');
        } else {
          mainContent.classList.remove('travel-page-active');
        }
      }
      
      // Update URL without page reload (preserve base path)
      const basePath = getBasePath();
      const path = sectionId === 'home' ? basePath + '/' : basePath + '/' + sectionId;
      window.history.pushState({ section: sectionId }, '', path);
      
      // Close mobile menu if open
      const menu = document.getElementById('mobileMenu');
      const hamburger = document.querySelector('.hamburger');
      if (menu) menu.classList.remove('active');
      if (hamburger) hamburger.classList.remove('active');
      
      return false;
    }
    
    // Handle browser back/forward buttons
    window.addEventListener('popstate', function(e) {
      if (e.state && e.state.section) {
        showSectionFromUrl(e.state.section);
      } else {
        // Default to home if no state
        showSectionFromUrl('home');
      }
    });
    
    // Helper function to show section without modifying history
    function showSectionFromUrl(sectionId) {
      const titles = {
        'home': 'M & N',
        'photos': 'Photos',
        'qa': 'Q + A',
        'travel': 'Hotels & Travel',
        'things': 'Things to Do',
        'rsvp': 'RSVP',
        'registry': 'Our Registry'
      };
      
      document.querySelectorAll('.page-section').forEach(section => {
        section.classList.remove('active');
      });
      
      document.querySelectorAll('#section-' + sectionId).forEach(section => {
        section.classList.add('active');
      });
      
      // Update nav active state (both desktop and mobile)
      document.querySelectorAll('.site-nav a, .mobile-menu nav a').forEach(link => {
        link.classList.remove('active');
      });
      
      // Add active to links that match the current section
      const sectionPath = sectionId === 'home' ? '/' : '/' + sectionId;
      document.querySelectorAll('.site-nav a, .mobile-menu nav a').forEach(link => {
        const href = link.getAttribute('href');
        if ((href === '/' && sectionId === 'home') || href === sectionPath) {
          link.classList.add('active');
        }
      });
      
      const mobileTitle = document.getElementById('mobilePageTitle');
      if (mobileTitle && titles[sectionId]) {
        mobileTitle.textContent = titles[sectionId];
      }
      
      // Show/hide countdown and hero photo on mobile (only on home page)
      const countdown = document.querySelector('.mobile-countdown');
      const heroPhoto = document.querySelector('.mobile-hero-photo');
      if (countdown) {
        countdown.style.display = sectionId === 'home' ? 'flex' : 'none';
      }
      if (heroPhoto) {
        heroPhoto.style.display = sectionId === 'home' ? 'block' : 'none';
      }
      
      // Toggle page-specific classes for mobile header hiding
      const mainContent = document.getElementById('mainContent');
      if (mainContent) {
        // Photos page
        if (sectionId === 'photos') {
          mainContent.classList.add('photos-page-active');
        } else {
          mainContent.classList.remove('photos-page-active');
        }
        // Registry page
        if (sectionId === 'registry') {
          mainContent.classList.add('registry-page-active');
          // Force-restart animations to fix iOS sync issue
          restartRegistryAnimations();
        } else {
          mainContent.classList.remove('registry-page-active');
        }
        // Q+A page
        if (sectionId === 'qa') {
          mainContent.classList.add('qa-page-active');
          startBouncer();
        } else {
          mainContent.classList.remove('qa-page-active');
          stopBouncer();
        }
        // Travel page
        if (sectionId === 'travel') {
          mainContent.classList.add('travel-page-active');
        } else {
          mainContent.classList.remove('travel-page-active');
        }
      }
    }
    
  </script>
